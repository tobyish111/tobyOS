# tobyOS /etc/drvmatch.conf -- Milestone 35A driver overrides.
#
# This file lets the operator change which in-tree driver claims
# specific PCI devices at boot time. Two rule types are supported:
#
#   blacklist <driver-name>
#       Disables the named driver before pci_bind_drivers runs.
#       Anything currently bound is unbound and the bind pass is
#       re-run so a fallback driver (or "no driver at all") gets
#       a fair shot.
#
#   force <vid>:<did> <driver-name>
#       Forces a specific PCI device (matched by exact vendor and
#       device ID) to be claimed by the named driver, regardless of
#       its position in the registry. If the driver isn't registered
#       or its probe declines, the device falls back to the normal
#       match loop -- a force rule never makes a device LESS bindable.
#
# Lines starting with '#' are comments. Blank lines are skipped.
# Hex IDs may be written with or without an "0x" prefix.
#
# The defaults below are commented out; uncomment to apply.

# blacklist rtl8169                  # disable Realtek NIC entirely
# blacklist e1000e                   # prefer the older e1000 path

# force 1AF4:1000 virtio-net         # pin virtio-net to legacy ID
# force 8086:100E e1000              # pin e1000 to QEMU's 82540EM
